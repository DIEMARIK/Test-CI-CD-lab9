name: CI/CD with Code Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Восстанавливаем зависимости (это должно установить все пакеты из csproj)
    - name: Restore dependencies
      run: dotnet restore lab9.1.sln

    # Собираем проект в Debug
    - name: Build
      run: dotnet build lab9.1.sln --no-restore --configuration Debug

    # Запускаем тесты с покрытием (простая команда)
    - name: Run tests with coverage
      run: |
        dotnet test tests/lab9.Tests.csproj \
          --configuration Debug \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --verbosity normal

    # Находим файл покрытия
    - name: Find coverage file
      run: |
        echo "=== Поиск coverage файлов ==="
        find ./TestResults -name "*.cobertura.xml" -type f
        if [ -z "$(find ./TestResults -name '*.cobertura.xml' -type f)" ]; then
          echo "Попробуем найти любой XML файл:"
          find ./TestResults -name "*.xml" -type f
        fi

    # Устанавливаем ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Генерируем отчет
    - name: Generate HTML report
      run: |
        COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
        
        if [ -z "$COVERAGE_FILE" ]; then
          echo "❌ Файл покрытия не найден!"
          exit 1
        fi
        
        echo "✅ Использую: $COVERAGE_FILE"
        
        reportgenerator \
          "-reports:$COVERAGE_FILE" \
          "-targetdir:./coveragereport" \
          "-reporttypes:Html" \
          "-sourcedirs:./src"

    # Загружаем отчет
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Code-Coverage-Report
        path: coveragereport
        retention-days: 7
