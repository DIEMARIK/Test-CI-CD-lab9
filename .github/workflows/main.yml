name: CI/CD with Code Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # или 6.0, 7.0, 9.0 — подставь свою версию

    # Восстанавливаем зависимости для ВСЕГО решения (он сам найдет все .csproj)
    - name: Restore dependencies
      run: dotnet restore lab9.1.sln

    # Собираем ВСЕ проекты в решении
    - name: Build
      run: dotnet build lab9.1.sln --no-restore --configuration Release

    # Устанавливаем Coverlet (если еще не установлен в тестовом проекте)
    - name: Install Coverlet
      run: dotnet add tests/lab9.Tests.csproj package coverlet.collector

    # ЗАПУСК ТЕСТОВ С ПОКРЫТИЕМ — УКАЗЫВАЕМ ПРЯМОЙ ПУТЬ К ТЕСТОВОМУ ПРОЕКТУ
    - name: Run tests with coverage
      run: |
        dotnet test tests/lab9.Tests.csproj \
          --no-build \
          --configuration Release \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=./TestResults/ \
          /p:Exclude="[xunit*]*"

    # Устанавливаем ReportGenerator для красивого HTML
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Генерируем HTML отчет
    - name: Generate HTML report
      run: |
        reportgenerator \
          "-reports:./TestResults/coverage.cobertura.xml" \
          "-targetdir:./coveragereport" \
          "-reporttypes:Html"

    # ЗАГРУЖАЕМ ОТЧЕТ КАК АРТЕФАКТ (это главное — ты увидишь его во вкладке Actions)
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Code-Coverage-Report
        path: coveragereport
