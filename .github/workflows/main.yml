name: CI/CD Pipeline

on: 
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Восстанавливаем основной проект
      - name: Restore main project
        run: dotnet restore src/lab9.1.csproj

      # Собираем основной проект
      - name: Build main project
        run: dotnet build src/lab9.1.csproj --configuration Release --no-restore

      # Восстанавливаем тестовый проект
      - name: Restore test project
        run: dotnet restore tests/lab9.1.Tests.csproj

      # Собираем тестовый проект
      - name: Build test project
        run: dotnet build tests/lab9.1.Tests.csproj --configuration Release --no-restore

      # Запускаем тесты с покрытием
      - name: Run tests with coverage
        run: |
          dotnet test tests/lab9.1.Tests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # Устанавливаем ReportGenerator
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      # Генерируем отчет
      - name: Generate coverage report
        run: |
          COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
          
          if [ -f "$COVERAGE_FILE" ]; then
            reportgenerator -reports:"$COVERAGE_FILE" -targetdir:"./CoverageReport" -reporttypes:"Html"
            echo "✅ Coverage report generated"
            
            # Показываем проценты
            LINE_RATE=$(grep -o 'line-rate="[0-9.]*"' "$COVERAGE_FILE" | head -1 | cut -d'"' -f2)
            echo "📈 Line Coverage: $(echo "$LINE_RATE * 100" | bc)%"
          else
            echo "⚠️ No coverage file found"
            mkdir -p ./CoverageReport
            echo "<html><body><h1>No coverage data</h1></body></html>" > ./CoverageReport/index.html
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7
