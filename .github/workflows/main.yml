name: CI/CD with Code Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Восстанавливаем зависимости
    - name: Restore dependencies
      run: dotnet restore lab9.1.sln

    # ВАЖНО: Собираем в Debug (для PDB файлов)
    - name: Build
      run: dotnet build lab9.1.sln --no-restore --configuration Debug

    # Устанавливаем Coverlet
    - name: Install Coverlet
      run: |
        cd tests
        dotnet add package coverlet.collector --version 6.0.0
        cd ..

    # ЗАПУСК ТЕСТОВ С ПОКРЫТИЕМ (ЯВНО УКАЗЫВАЕМ ПУТИ)
    - name: Run tests with coverage
      run: |
        dotnet test tests/lab9.Tests.csproj \
          --configuration Debug \
          --no-build \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --verbosity normal

    # Показываем, какие файлы найдены (для диагностики)
    - name: Debug - show files
      run: |
        echo "=== Поиск coverage файлов ==="
        find ./TestResults -name "*.xml" -type f
        echo "=== Содержимое TestResults ==="
        ls -la ./TestResults/

    # Устанавливаем ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Генерируем HTML отчет с указанием папки с исходниками
    - name: Generate HTML report
      run: |
        COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
        echo "Использую файл: $COVERAGE_FILE"
        
        reportgenerator \
          "-reports:$COVERAGE_FILE" \
          "-targetdir:./coveragereport" \
          "-reporttypes:Html" \
          "-sourcedirs:./src"

    # Загружаем отчет
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Code-Coverage-Report
        path: coveragereport
