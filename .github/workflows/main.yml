name: CI/CD with Code Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Восстанавливаем зависимости
    - name: Restore dependencies
      run: dotnet restore lab9.1.sln

    # Собираем проект
    - name: Build
      run: dotnet build lab9.1.sln --no-restore --configuration Release

    # Устанавливаем Coverlet (ВАЖНО: используем --version)
    - name: Install Coverlet
      run: |
        cd tests
        dotnet add package coverlet.collector --version 6.0.0
        cd ..

    # ЗАПУСК ТЕСТОВ С ПОКРЫТИЕМ (ПРАВИЛЬНЫЙ СИНТАКСИС)
    - name: Run tests with coverage
      run: |
        cd tests
        dotnet test --no-build \
          --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ../TestResults
        cd ..

    # Устанавливаем ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Ищем сгенерированный файл покрытия и конвертируем в HTML
    - name: Generate HTML report
      run: |
        # Находим файл coverage.cobertura.xml (он может быть во вложенной папке)
        COVERAGE_FILE=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
        if [ -z "$COVERAGE_FILE" ]; then
          echo "Файл покрытия не найден!"
          exit 1
        fi
        echo "Найден файл: $COVERAGE_FILE"
        
        reportgenerator \
          "-reports:$COVERAGE_FILE" \
          "-targetdir:./coveragereport" \
          "-reporttypes:Html"

    # Загружаем отчет как артефакт
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Code-Coverage-Report
        path: coveragereport
