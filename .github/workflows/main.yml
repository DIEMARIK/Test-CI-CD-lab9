name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore lab9.1.sln

      - name: Build
        run: dotnet build lab9.1.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test tests/lab9.1.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate report
        run: |
          COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
          
          if [ -f "$COVERAGE_FILE" ]; then
            reportgenerator -reports:"$COVERAGE_FILE" -targetdir:"./CoverageReport" -reporttypes:"Html"
            echo "✅ Report generated"
          else
            echo "⚠️ No coverage file found"
            mkdir -p ./CoverageReport
            echo "<html><body><h1>No coverage data</h1></body></html>" > ./CoverageReport/index.html
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
          retention-days: 7
