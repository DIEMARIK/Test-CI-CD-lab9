name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build all
        run: dotnet build --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test tests/lab9.1.Tests/lab9.1.Tests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings coverlet.runsettings

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
          reportgenerator -reports:"$COVERAGE_FILE" -targetdir:"./DetailedCoverageReport" -reporttypes:"Html;HtmlInline;HtmlChart;Badges"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./DetailedCoverageReport
          retention-days: 7
