name: CI/CD with Code Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Восстанавливаем зависимости
    - name: Restore dependencies
      run: dotnet restore lab9.1.sln

    # Собираем проект в Debug
    - name: Build
      run: dotnet build lab9.1.sln --no-restore --configuration Debug

    # ПРОВЕРКА: показываем, какие тесты найдены
    - name: List test files
      run: |
        echo "=== Файлы в tests ==="
        ls -la tests/
        echo "=== Поиск тестов ==="
        find tests -name "*.cs" -type f

    # Запускаем тесты (упрощенная команда)
    - name: Run tests
      run: |
        cd tests
        dotnet test --configuration Debug --verbosity normal
        cd ..

    # Запускаем тесты с покрытием
    - name: Run tests with coverage
      run: |
        dotnet test tests/lab9.Tests.csproj \
          --configuration Debug \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --verbosity detailed

    # Находим файл покрытия
    - name: Debug coverage file
      run: |
        echo "=== Поиск coverage файлов ==="
        find ./TestResults -name "*.xml" -type f
        echo "=== Структура TestResults ==="
        tree ./TestResults || ls -laR ./TestResults

    # Устанавливаем ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Генерируем отчет
    - name: Generate HTML report
      run: |
        COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
        
        if [ -z "$COVERAGE_FILE" ]; then
          echo "❌ Файл покрытия не найден!"
          echo "Ищем любой XML файл:"
          find ./TestResults -name "*.xml"
          exit 1
        fi
        
        echo "✅ Использую: $COVERAGE_FILE"
        
        reportgenerator \
          "-reports:$COVERAGE_FILE" \
          "-targetdir:./coveragereport" \
          "-reporttypes:Html" \
          "-sourcedirs:./src"

    # Загружаем отчет
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Code-Coverage-Report
        path: coveragereport
        retention-days: 7
