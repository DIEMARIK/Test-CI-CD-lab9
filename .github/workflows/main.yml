name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build src/lab9.1.csproj --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test tests/lab9.1.Tests.csproj \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --settings:coverlet.runsettings

      - name: Generate coverage report
        run: |
          # Устанавливаем ReportGenerator, если его нет
          dotnet tool install -g dotnet-reportgenerator-globaltool

          # Генерируем HTML‑отчёт из результатов Coverlet
          reportgenerator \
            -reports:**/coverage.cobertura.xml \
            -targetdir:coveragereport \
            -reporttypes:HTML

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport/
          retention-days: 14

      - name: Display coverage summary
        run: cat coveragereport/index.html | grep -A 10 "Coverage Summary" || echo "Coverage summary not found"
