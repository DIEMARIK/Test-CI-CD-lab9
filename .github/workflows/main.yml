name: CI/CD with Code Coverage

on: 
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # ПРОВЕРКА: какие пакеты установлены
    - name: Check csproj files
      run: |
        echo "=== lab9.Tests.csproj ==="
        cat tests/lab9.Tests.csproj

    # ЯВНАЯ УСТАНОВКА ВСЕХ ПАКЕТОВ ДЛЯ ТЕСТОВ
    - name: Install test packages
      run: |
        cd tests
        dotnet add package Microsoft.NET.Test.Sdk --version 17.7.0
        dotnet add package MSTest.TestAdapter --version 3.1.1
        dotnet add package MSTest.TestFramework --version 3.1.1
        dotnet add package coverlet.collector --version 6.0.0
        cd ..

    # Восстанавливаем зависимости
    - name: Restore dependencies
      run: dotnet restore lab9.1.sln

    # Собираем проект в Debug
    - name: Build
      run: dotnet build lab9.1.sln --no-restore --configuration Debug

    # Запускаем тесты (без покрытия, для проверки)
    - name: Run tests (basic)
      run: |
        cd tests
        dotnet test --configuration Debug --verbosity normal --logger "console;verbosity=detailed"
        cd ..

    # Запускаем тесты с покрытием
    - name: Run tests with coverage
      run: |
        dotnet test tests/lab9.Tests.csproj \
          --configuration Debug \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --logger "trx;LogFileName=test_results.trx" \
          --verbosity detailed

    # Находим файл покрытия
    - name: Find coverage file
      run: |
        echo "=== Поиск coverage файлов ==="
        find ./TestResults -name "*.cobertura.xml" -type f
        echo "=== Все XML файлы ==="
        find ./TestResults -name "*.xml" -type f

    # Устанавливаем ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    # Генерируем отчет
    - name: Generate HTML report
      run: |
        COVERAGE_FILE=$(find ./TestResults -name "*.cobertura.xml" | head -1)
        
        if [ -z "$COVERAGE_FILE" ]; then
          echo "❌ Файл покрытия не найден!"
          echo "Содержимое TestResults:"
          ls -laR ./TestResults/
          exit 1
        fi
        
        echo "✅ Использую: $COVERAGE_FILE"
        
        reportgenerator \
          "-reports:$COVERAGE_FILE" \
          "-targetdir:./coveragereport" \
          "-reporttypes:Html" \
          "-sourcedirs:./src"

    # Загружаем отчет
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Code-Coverage-Report
        path: coveragereport
        retention-days: 7
